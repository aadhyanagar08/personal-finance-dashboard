name: Deploy

# Triggers only on pushes to main (direct commits or merged PRs).
on:
  push:
    branches: [main]

jobs:
  # ---------------------------------------------------------------------------
  # Re-run the full CI pipeline (lint → test → docker-build) before deploying.
  # Using workflow_call ensures we run the exact same checks as the CI workflow.
  # The push-image job only starts after ALL three CI jobs succeed.
  # ---------------------------------------------------------------------------
  ci:
    name: CI Checks
    uses: ./.github/workflows/ci.yml
    # Pass any repository secrets the CI workflow might need.
    secrets: inherit

  # ---------------------------------------------------------------------------
  # Build the production Docker image and push it to GitHub Container Registry.
  # Tagged with both the commit SHA (immutable) and "latest" (rolling pointer).
  # ---------------------------------------------------------------------------
  push-image:
    name: Build & Push to GHCR
    needs: ci
    runs-on: ubuntu-latest

    permissions:
      contents: read   # checkout
      packages: write  # push to ghcr.io

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Derive image tags from git metadata:
      #   ghcr.io/<owner>/<repo>:sha-<short-sha>   (immutable, for rollbacks)
      #   ghcr.io/<owner>/<repo>:latest             (rolling, for convenience)
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=sha,prefix=sha-,format=short
            type=raw,value=latest

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # The GHA cache (type=gha) reuses layers built by the CI "build" job,
      # so the cmdstan download and pip installs are already cached.
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Image digest
        run: echo "Pushed ${{ steps.meta.outputs.tags }}"
