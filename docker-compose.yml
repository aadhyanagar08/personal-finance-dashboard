services:
  # ---------------------------------------------------------------------------
  # PostgreSQL 15
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: finplatform
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d finplatform"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ---------------------------------------------------------------------------
  # Backend API
  # The entrypoint runs `alembic upgrade head` before starting uvicorn so the
  # schema is always up-to-date on container start.
  # ---------------------------------------------------------------------------
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    environment:
      # Override the DATABASE_URL so the app connects to the compose network
      # hostname ("postgres") instead of "localhost".
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/finplatform
    ports:
      - "8000:8000"
    volumes:
      # Persist trained ML models across container restarts.
      - model_data:/app/data/models
    depends_on:
      postgres:
        condition: service_healthy

  # ---------------------------------------------------------------------------
  # Frontend (React + Vite, served by nginx)
  # The app talks directly to the backend API at http://localhost:8000 from
  # the browser, so no proxy is needed here.
  # ---------------------------------------------------------------------------
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      - backend

# ---------------------------------------------------------------------------
# Named volumes
# ---------------------------------------------------------------------------
volumes:
  postgres_data:
    driver: local
  model_data:
    driver: local
